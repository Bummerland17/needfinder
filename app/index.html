<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>NeedFinder App</title>
  <meta name="description" content="Find bathrooms, changing tables, quiet spaces, dog-friendly spots, and overnight parking near you." />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#0a0d12" />

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0d12;
      --bg2: #111620;
      --bg3: #1a2030;
      --accent: #4f9cf9;
      --accent2: #7c5cfc;
      --green: #22c55e;
      --red: #ef4444;
      --text: #f1f5f9;
      --muted: #8b99b5;
      --card: #141923;
      --border: rgba(255,255,255,0.08);
      --radius: 14px;
      --header-h: 60px;
      --module-h: 72px;
      --results-h: 300px;
    }

    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
    }

    /* LAYOUT */
    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      height: 100dvh;
    }

    /* HEADER */
    header {
      height: var(--header-h);
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 12px;
      flex-shrink: 0;
      z-index: 1000;
    }
    .back-btn {
      color: var(--accent);
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 600;
      padding: 6px 0;
    }
    .header-logo {
      font-weight: 800;
      font-size: 1.05rem;
      flex: 1;
    }
    .header-status {
      font-size: 0.75rem;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--muted);
    }
    .status-dot.active { background: var(--green); }

    /* MODULE SELECTOR */
    .module-bar {
      height: var(--module-h);
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 14px;
      overflow-x: auto;
      flex-shrink: 0;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .module-bar::-webkit-scrollbar { display: none; }

    .module-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      padding: 8px 14px;
      border-radius: 12px;
      border: 1.5px solid var(--border);
      background: var(--card);
      color: var(--muted);
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
      transition: all 0.18s;
      font-family: inherit;
    }
    .module-btn .icon { font-size: 1.4rem; }
    .module-btn .label { font-size: 0.65rem; font-weight: 600; letter-spacing: 0.3px; }
    .module-btn:active { transform: scale(0.95); }
    .module-btn.active {
      background: linear-gradient(135deg, rgba(79,156,249,0.15), rgba(124,92,252,0.15));
      border-color: var(--accent);
      color: var(--accent);
    }

    /* MAP */
    #map {
      flex: 1;
      min-height: 0;
      z-index: 1;
    }

    /* Custom Leaflet overrides for dark theme */
    .leaflet-tile { filter: brightness(0.85) saturate(0.9); }
    .leaflet-control-attribution { font-size: 9px !important; }
    .leaflet-popup-content-wrapper {
      background: var(--card) !important;
      color: var(--text) !important;
      border: 1px solid var(--border) !important;
      border-radius: 12px !important;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5) !important;
    }
    .leaflet-popup-tip { background: var(--card) !important; }
    .leaflet-popup-close-button { color: var(--muted) !important; }

    /* BOTTOM PANEL */
    #bottom-panel {
      background: var(--bg2);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
      max-height: 50vh;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      z-index: 100;
      transition: max-height 0.3s ease;
    }
    #bottom-panel.collapsed { max-height: 52px; }

    .panel-handle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px;
      cursor: pointer;
      user-select: none;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: var(--bg2);
      z-index: 1;
    }
    .panel-title { font-weight: 700; font-size: 0.9rem; }
    .panel-count { color: var(--muted); font-size: 0.8rem; }
    .panel-toggle { color: var(--muted); font-size: 0.8rem; transition: transform 0.2s; }
    #bottom-panel.collapsed .panel-toggle { transform: rotate(180deg); }

    /* RESULT CARDS */
    .results-list { padding: 8px 12px 12px; display: flex; flex-direction: column; gap: 8px; }

    .result-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      display: flex;
      gap: 12px;
      align-items: flex-start;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }
    .result-card:hover, .result-card:active { border-color: var(--accent); background: var(--bg3); }

    .result-icon {
      font-size: 1.5rem;
      flex-shrink: 0;
      width: 40px;
      height: 40px;
      background: var(--bg3);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .result-body { flex: 1; min-width: 0; }
    .result-name {
      font-weight: 700;
      font-size: 0.9rem;
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .result-addr {
      color: var(--muted);
      font-size: 0.75rem;
      margin-bottom: 6px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .result-meta {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .result-dist {
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--green);
      background: rgba(34,197,94,0.1);
      padding: 2px 8px;
      border-radius: 50px;
    }
    .result-rating {
      font-size: 0.72rem;
      font-weight: 600;
      color: #fbbf24;
      background: rgba(251,191,36,0.1);
      padding: 2px 8px;
      border-radius: 50px;
    }
    .result-actions {
      display: flex;
      flex-direction: column;
      gap: 6px;
      flex-shrink: 0;
    }
    .btn-directions {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: white;
      border: none;
      padding: 6px 12px;
      border-radius: 50px;
      font-size: 0.72rem;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
      font-family: inherit;
    }

    /* STATES */
    .state-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 32px;
      background: rgba(10,13,18,0.85);
      z-index: 500;
      backdrop-filter: blur(4px);
    }
    .state-icon { font-size: 3rem; margin-bottom: 16px; }
    .state-title { font-size: 1.2rem; font-weight: 700; margin-bottom: 8px; }
    .state-sub { color: var(--muted); font-size: 0.875rem; line-height: 1.6; max-width: 280px; }
    .state-btn {
      margin-top: 24px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: white;
      border: none;
      padding: 14px 28px;
      border-radius: 50px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      transition: transform 0.15s, opacity 0.15s;
    }
    .state-btn:active { transform: scale(0.97); }

    /* ADD SPOT FAB */
    #fab-add {
      position: absolute;
      bottom: calc(var(--panel-h, 52px) + 16px);
      right: 16px;
      z-index: 200;
      width: 52px; height: 52px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      border-radius: 50%;
      font-size: 1.4rem;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(79,156,249,0.4);
      transition: transform 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #fab-add:active { transform: scale(0.92); }

    /* LOCATE BTN */
    #btn-locate {
      position: absolute;
      top: 12px;
      right: 12px;
      z-index: 200;
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text);
      width: 40px; height: 40px;
      border-radius: 10px;
      font-size: 1.1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 12px rgba(0,0,0,0.4);
      transition: background 0.15s;
    }
    #btn-locate:hover { background: var(--bg3); }

    /* SPINNER */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }

    /* USER MARKER */
    .user-dot {
      width: 16px; height: 16px;
      background: var(--accent);
      border: 3px solid white;
      border-radius: 50%;
      box-shadow: 0 0 0 4px rgba(79,156,249,0.25);
    }
    @keyframes pulse-ring {
      0% { transform: scale(0.8); opacity: 1; }
      100% { transform: scale(2.4); opacity: 0; }
    }
    .user-dot-pulse {
      width: 16px; height: 16px;
      background: rgba(79,156,249,0.4);
      border-radius: 50%;
      animation: pulse-ring 1.8s ease-out infinite;
      position: absolute;
      top: 0; left: 0;
    }

    /* Empty state in results */
    .empty-results {
      text-align: center;
      padding: 24px;
      color: var(--muted);
      font-size: 0.875rem;
    }
    .empty-results .big { font-size: 2rem; margin-bottom: 8px; }

    /* Pro badge */
    .pro-banner {
      background: linear-gradient(135deg, rgba(79,156,249,0.1), rgba(124,92,252,0.1));
      border-top: 1px solid rgba(79,156,249,0.15);
      padding: 10px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 0.78rem;
      flex-shrink: 0;
    }
    .pro-banner span { color: var(--muted); }
    .pro-btn {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: white;
      border: none;
      padding: 5px 12px;
      border-radius: 50px;
      font-size: 0.72rem;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
    }
  </style>
</head>
<body>

<div id="app">
  <header>
    <a href="../" class="back-btn">← Home</a>
    <div class="header-logo">📍 NeedFinder</div>
    <div class="header-status">
      <div class="status-dot" id="status-dot"></div>
      <span id="status-text">Locating…</span>
    </div>
  </header>

  <!-- MODULE SELECTOR -->
  <div class="module-bar" id="module-bar">
    <button class="module-btn active" data-module="bathroom">
      <span class="icon">🚽</span>
      <span class="label">Bathroom</span>
    </button>
    <button class="module-btn" data-module="changing">
      <span class="icon">👶</span>
      <span class="label">Changing</span>
    </button>
    <button class="module-btn" data-module="quiet">
      <span class="icon">🤫</span>
      <span class="label">Quiet Space</span>
    </button>
    <button class="module-btn" data-module="dog">
      <span class="icon">🐕</span>
      <span class="label">Dog-Friendly</span>
    </button>
    <button class="module-btn" data-module="parking">
      <span class="icon">🚐</span>
      <span class="label">Parking</span>
    </button>
  </div>

  <!-- MAP CONTAINER (relative for FAB positioning) -->
  <div style="flex:1;position:relative;min-height:0">
    <div id="map"></div>

    <!-- Locate me button -->
    <button id="btn-locate" title="My location">📍</button>

    <!-- Loading/Welcome/Error overlay -->
    <div class="state-overlay" id="state-overlay">
      <div class="spinner"></div>
      <div class="state-title">Finding your location…</div>
      <div class="state-sub" id="state-sub">Please allow location access when prompted.</div>
    </div>

    <!-- FAB -->
    <button id="fab-add" title="Add a spot" onclick="window.open('https://forms.gle/placeholder', '_blank')">➕</button>
  </div>

  <!-- BOTTOM RESULTS PANEL -->
  <div id="bottom-panel">
    <div class="panel-handle" id="panel-handle">
      <div>
        <span class="panel-title" id="panel-title">Nearby Bathrooms</span>
        <span class="panel-count" id="panel-count"> — tap a module to search</span>
      </div>
      <span class="panel-toggle">▲</span>
    </div>
    <div id="results-list" class="results-list">
      <!-- Results injected here -->
    </div>
  </div>

  <!-- PRO BANNER -->
  <div class="pro-banner">
    <span>⭐ NeedFinder Pro — offline maps, no ads, community reviews</span>
    <button class="pro-btn" onclick="window.open('https://buy.stripe.com/6oU6oGbFidsg1fN9BGbsc0b','_blank')">$2.99/mo</button>
  </div>
</div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<!-- Google Maps JS API (Places library) -->
<script>
  window._gmapsLoaded = false;
  window._gmapsReady = new Promise(resolve => {
    window._gmapsInitCallback = function() {
      window._gmapsLoaded = true;
      resolve();
    };
  });
</script>
<script async defer
  src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAuBYyoyqOvNalVNrnff1giboFsG_tXGfI&libraries=places&callback=_gmapsInitCallback">
</script>

<script>
// ─── CONFIG ─────────────────────────────────────────────────────────
const MODULES = {
  bathroom: {
    label: 'Bathrooms',
    icon: '🚽',
    keyword: 'public restroom toilet bathroom',
    type: '',
    radius: 1500,
  },
  changing: {
    label: 'Changing Tables',
    icon: '👶',
    keyword: 'baby changing station',
    type: '',
    radius: 2000,
  },
  quiet: {
    label: 'Quiet Spaces',
    icon: '🤫',
    keyword: 'quiet room meditation room prayer room',
    type: '',
    radius: 2000,
  },
  dog: {
    label: 'Dog-Friendly Spots',
    icon: '🐕',
    keyword: 'dog friendly',
    type: 'park',
    radius: 2000,
  },
  parking: {
    label: 'Overnight Parking',
    icon: '🚐',
    keyword: 'RV parking overnight parking truck stop',
    type: '',
    radius: 5000,
  },
};

// ─── STATE ───────────────────────────────────────────────────────────
let map, userMarker, userLat, userLng;
let placesService = null;
let currentModule = 'bathroom';
let markers = [];
let panelCollapsed = false;

// ─── MAP INIT ────────────────────────────────────────────────────────
function initMap(lat, lng) {
  map = L.map('map', {
    zoomControl: false,
    attributionControl: true,
  }).setView([lat, lng], 15);

  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '© OpenStreetMap contributors © CARTO',
    subdomains: 'abcd',
    maxZoom: 19,
  }).addTo(map);

  // Zoom control top-left
  L.control.zoom({ position: 'topleft' }).addTo(map);

  // User location marker
  const userIcon = L.divIcon({
    className: '',
    html: `<div style="position:relative;width:16px;height:16px">
             <div class="user-dot-pulse"></div>
             <div class="user-dot"></div>
           </div>`,
    iconSize: [16, 16],
    iconAnchor: [8, 8],
  });
  userMarker = L.marker([lat, lng], { icon: userIcon, zIndexOffset: 1000 })
    .addTo(map)
    .bindPopup('<b>📍 You are here</b>');

  // Init Places service with a hidden div (required by Places API)
  window._gmapsReady.then(() => {
    const hiddenDiv = document.createElement('div');
    placesService = new google.maps.places.PlacesService(hiddenDiv);
    search(currentModule);
  });
}

// ─── GEOLOCATION ─────────────────────────────────────────────────────
function locate() {
  showOverlay('loading', 'Finding your location…', 'Please allow location access when prompted.');
  setStatus(false, 'Locating…');

  if (!navigator.geolocation) {
    showOverlay('error', 'Not supported', 'Your browser doesn\'t support geolocation.');
    return;
  }
  navigator.geolocation.getCurrentPosition(
    pos => {
      userLat = pos.coords.latitude;
      userLng = pos.coords.longitude;
      setStatus(true, 'Located');
      hideOverlay();
      if (!map) {
        initMap(userLat, userLng);
      } else {
        map.setView([userLat, userLng], 15);
        userMarker.setLatLng([userLat, userLng]);
        search(currentModule);
      }
    },
    err => {
      console.warn('Geolocation error:', err);
      // Fallback to NYC for demo
      userLat = 40.7484;
      userLng = -73.9967;
      setStatus(false, 'Demo mode');
      showOverlay('error',
        '📍 Location unavailable',
        'Showing demo results near New York City. Enable location for real results.',
        'Continue in Demo Mode',
        () => {
          hideOverlay();
          if (!map) initMap(userLat, userLng);
          else { map.setView([userLat, userLng], 14); search(currentModule); }
        }
      );
    },
    { enableHighAccuracy: true, timeout: 10000, maximumAge: 60000 }
  );
}

// ─── PLACES SEARCH ───────────────────────────────────────────────────
function search(moduleKey) {
  currentModule = moduleKey;
  if (!userLat || !map) return;

  const mod = MODULES[moduleKey];
  updatePanelTitle(mod.label, null, '⟳ Searching…');
  clearMarkers();

  if (!placesService) {
    // GMaps not ready yet — show loading and retry
    window._gmapsReady.then(() => {
      const hiddenDiv = document.createElement('div');
      placesService = new google.maps.places.PlacesService(hiddenDiv);
      search(moduleKey);
    });
    return;
  }

  const request = {
    location: new google.maps.LatLng(userLat, userLng),
    radius: mod.radius,
    keyword: mod.keyword,
  };
  if (mod.type) request.type = mod.type;

  placesService.nearbySearch(request, (results, status) => {
    if (status === google.maps.places.PlacesServiceStatus.OK && results.length > 0) {
      renderResults(results, mod);
    } else if (status === google.maps.places.PlacesServiceStatus.ZERO_RESULTS) {
      updatePanelTitle(mod.label, 0);
      showEmptyResults(mod.icon, 'No results found nearby', 'Try a different category or zoom out.');
    } else {
      console.error('Places error:', status);
      updatePanelTitle(mod.label, 0);
      showEmptyResults('⚠️', 'Search failed', `Error: ${status}. Check API key or try again.`);
    }
  });
}

function renderResults(results, mod) {
  updatePanelTitle(mod.label, results.length);
  const list = document.getElementById('results-list');
  list.innerHTML = '';

  // Open panel
  const panel = document.getElementById('bottom-panel');
  panel.classList.remove('collapsed');
  panelCollapsed = false;
  document.querySelector('.panel-toggle').textContent = '▲';

  const bounds = L.latLngBounds();
  bounds.extend([userLat, userLng]);

  results.slice(0, 15).forEach((place, i) => {
    const lat = place.geometry.location.lat();
    const lng = place.geometry.location.lng();
    const dist = getDistanceMi(userLat, userLng, lat, lng);

    // Map marker
    const marker = createPlaceMarker(place, lat, lng, mod.icon, dist);
    bounds.extend([lat, lng]);

    // Result card
    const card = document.createElement('div');
    card.className = 'result-card';
    card.innerHTML = `
      <div class="result-icon">${mod.icon}</div>
      <div class="result-body">
        <div class="result-name">${escHtml(place.name)}</div>
        <div class="result-addr">${escHtml(place.vicinity || 'Address unavailable')}</div>
        <div class="result-meta">
          <span class="result-dist">${dist} mi</span>
          ${place.rating ? `<span class="result-rating">★ ${place.rating}</span>` : ''}
          ${place.opening_hours?.open_now !== undefined
            ? `<span style="font-size:.7rem;font-weight:600;padding:2px 8px;border-radius:50px;background:${place.opening_hours.open_now ? 'rgba(34,197,94,.1)' : 'rgba(239,68,68,.1)'};color:${place.opening_hours.open_now ? 'var(--green)' : 'var(--red)'}">${place.opening_hours.open_now ? 'Open' : 'Closed'}</span>`
            : ''}
        </div>
      </div>
      <div class="result-actions">
        <button class="btn-directions" onclick="openDirections(${lat},${lng},'${escHtml(place.name).replace(/'/g,"\\'")}')">Directions</button>
      </div>
    `;
    card.addEventListener('click', (e) => {
      if (e.target.classList.contains('btn-directions')) return;
      map.setView([lat, lng], 17);
      marker.openPopup();
    });
    list.appendChild(card);
  });

  // Fit map to show user + results
  if (bounds.isValid()) {
    map.fitBounds(bounds, { padding: [60, 60], maxZoom: 16 });
  }
}

function createPlaceMarker(place, lat, lng, icon, dist) {
  const markerIcon = L.divIcon({
    className: '',
    html: `<div style="background:#141923;border:2px solid #4f9cf9;border-radius:50%;width:30px;height:30px;display:flex;align-items:center;justify-content:center;font-size:14px;box-shadow:0 2px 8px rgba(0,0,0,.4)">${icon}</div>`,
    iconSize: [30, 30],
    iconAnchor: [15, 15],
  });

  const marker = L.marker([lat, lng], { icon: markerIcon }).addTo(map);
  marker.bindPopup(`
    <div style="min-width:160px">
      <div style="font-weight:700;margin-bottom:4px">${escHtml(place.name)}</div>
      <div style="color:#8b99b5;font-size:.78rem;margin-bottom:6px">${escHtml(place.vicinity || '')}</div>
      <div style="display:flex;gap:6px;align-items:center;margin-bottom:8px">
        <span style="color:#22c55e;font-size:.75rem;font-weight:600">${dist} mi away</span>
        ${place.rating ? `<span style="color:#fbbf24;font-size:.75rem">★ ${place.rating}</span>` : ''}
      </div>
      <a href="https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}&destination_place_id=${place.place_id}"
         target="_blank"
         style="background:linear-gradient(135deg,#4f9cf9,#7c5cfc);color:white;padding:6px 14px;border-radius:50px;font-size:.75rem;font-weight:700;text-decoration:none;display:inline-block">
        Get Directions →
      </a>
    </div>
  `);
  markers.push(marker);
  return marker;
}

// ─── HELPERS ─────────────────────────────────────────────────────────
function clearMarkers() {
  markers.forEach(m => map && map.removeLayer(m));
  markers = [];
}

function getDistanceMi(lat1, lng1, lat2, lng2) {
  const R = 3958.8; // miles
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLng = (lng2 - lng1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLng/2)**2;
  return (R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a))).toFixed(2);
}

function openDirections(lat, lng, name) {
  window.open(`https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}`, '_blank');
}

function escHtml(str) {
  const d = document.createElement('div');
  d.textContent = str || '';
  return d.innerHTML;
}

function setStatus(active, text) {
  document.getElementById('status-dot').className = 'status-dot' + (active ? ' active' : '');
  document.getElementById('status-text').textContent = text;
}

function updatePanelTitle(label, count, extra) {
  document.getElementById('panel-title').textContent = `Nearby ${label}`;
  document.getElementById('panel-count').textContent =
    count === null ? (extra ? ` — ${extra}` : '') :
    count !== undefined ? ` — ${count} found` : '';
}

function showEmptyResults(icon, title, sub) {
  const list = document.getElementById('results-list');
  list.innerHTML = `<div class="empty-results"><div class="big">${icon}</div><div style="font-weight:700;margin-bottom:4px">${title}</div><div>${sub}</div></div>`;
  const panel = document.getElementById('bottom-panel');
  panel.classList.remove('collapsed');
}

// Overlay states: 'loading' | 'error'
function showOverlay(type, title, sub, btnText, btnCallback) {
  const el = document.getElementById('state-overlay');
  el.style.display = 'flex';
  el.innerHTML = type === 'loading'
    ? `<div class="spinner"></div><div class="state-title">${title}</div><div class="state-sub">${sub}</div>`
    : `<div class="state-icon">⚠️</div><div class="state-title">${title}</div><div class="state-sub" id="state-sub">${sub}</div>
       ${btnText ? `<button class="state-btn" id="overlay-btn">${btnText}</button>` : ''}`;
  if (btnCallback) {
    document.getElementById('overlay-btn')?.addEventListener('click', btnCallback);
  }
}

function hideOverlay() {
  const el = document.getElementById('state-overlay');
  el.style.display = 'none';
}

// ─── EVENTS ──────────────────────────────────────────────────────────
document.querySelectorAll('.module-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.module-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    search(btn.dataset.module);
  });
});

document.getElementById('panel-handle').addEventListener('click', () => {
  const panel = document.getElementById('bottom-panel');
  panelCollapsed = !panelCollapsed;
  panel.classList.toggle('collapsed', panelCollapsed);
  document.querySelector('.panel-toggle').textContent = panelCollapsed ? '▲' : '▲';
});

document.getElementById('btn-locate').addEventListener('click', locate);

// ─── START ───────────────────────────────────────────────────────────
locate();
</script>
</body>
</html>
